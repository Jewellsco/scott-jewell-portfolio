<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:"Inter",-apple-system,sans-serif;min-height:100vh;color:#fff;
    background:radial-gradient(1000px 560px at 82% -6%,rgba(232,176,75,.16),transparent 62%),
               radial-gradient(760px 480px at 8% 8%,rgba(30,102,255,.14),transparent 58%),
               radial-gradient(560px 380px at 55% 108%,rgba(232,176,75,.08),transparent 60%),#0A0B10;
    display:flex;align-items:center;justify-content:center;padding:24px;}
  .gate{width:min(420px,94vw);background:rgba(10,12,18,.62);border:1px solid rgba(255,255,255,.12);
    border-radius:20px;padding:38px 34px;text-align:center;backdrop-filter:blur(12px);
    box-shadow:0 40px 90px rgba(4,5,10,.55);}
  .sj{font-family:"Fraunces",serif;font-size:17px;font-weight:600;margin-bottom:22px;}
  .lock{width:44px;height:44px;border-radius:14px;background:rgba(232,176,75,.16);display:flex;
    align-items:center;justify-content:center;margin:0 auto 18px;}
  .lock svg{width:20px;height:20px;color:#F2CE8B;}
  h1{font-family:"Fraunces",serif;font-size:23px;font-weight:600;letter-spacing:-.3px;margin-bottom:10px;}
  p{font-size:13.5px;color:#C6CCDA;line-height:1.6;margin-bottom:22px;}
  form{display:flex;gap:8px;}
  input{flex:1;font-family:inherit;font-size:14px;color:#fff;background:rgba(255,255,255,.07);
    border:1.5px solid rgba(255,255,255,.18);border-radius:11px;padding:12px 14px;outline:none;transition:border-color .2s;}
  input:focus{border-color:#E8B04B;}
  input.err{border-color:#E06A5A;animation:shake .3s;}
  @keyframes shake{25%{transform:translateX(-4px);}75%{transform:translateX(4px);}}
  button{font-family:inherit;font-size:13.5px;font-weight:600;color:#fff;background:linear-gradient(130deg,#8a621f,#E8B04B);color:#141519;
    border:none;border-radius:11px;padding:12px 20px;cursor:pointer;position:relative;min-width:92px;
    transition:min-width .35s cubic-bezier(.2,.9,.3,1.2),width .35s cubic-bezier(.2,.9,.3,1.2),border-radius .35s ease,background .35s ease;}
  button:disabled{opacity:.6;}
  button .bl{position:absolute;inset:0;margin:auto;width:19px;height:19px;opacity:0;transform:scale(.5);
    transition:opacity .25s ease .12s,transform .4s cubic-bezier(.2,.9,.3,1.4) .12s;}
  button .sh{transform-origin:16px 11px;transition:transform .5s cubic-bezier(.2,.9,.3,1.35) .45s;}
  button.ok{min-width:48px;width:48px;padding:12px 0;border-radius:50%;background:linear-gradient(130deg,#1C7C54,#2FA475);pointer-events:none;animation:okPulse .7s ease .5s 1;}
  button.ok .bt{opacity:0;transition:opacity .15s;}
  button.ok .bl{opacity:1;transform:scale(1);}
  button.ok .sh{transform:translateY(-2.5px) rotate(26deg);}
  @keyframes okPulse{0%{box-shadow:0 0 0 0 rgba(47,164,117,.5);}100%{box-shadow:0 0 0 16px rgba(47,164,117,0);}}
  @media (prefers-reduced-motion:reduce){button,button .bl,button .sh{transition:none;}button.ok{animation:none;}}
  .msg{font-size:12px;color:#E0A196;margin-top:12px;min-height:16px;}
  .foot{margin-top:22px;font-size:12px;color:#98A0B3;line-height:1.6;}
  .foot a{color:#E4E7EF;}
  @media (prefers-reduced-motion:reduce){input.err{animation:none;}}
</style>

  const b64=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
  async function tryUnlock(pass,silent){
    const btn=document.getElementById('b'),inp=document.getElementById('p'),msg=document.getElementById('m');
    btn.disabled=true;if(!silent)msg.textContent='';
    try{
      const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pass),'PBKDF2',false,['deriveKey']);
      const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(SALT),iterations:ITER,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
      const raw=b64(DATA);

      const html=new TextDecoder().decode(plain);
      const go=()=>{document.open();document.write(html);document.close();};
      const reduce=window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      inp.disabled=true;msg.textContent='';
      btn.classList.add('ok');
      setTimeout(go,1150);

      btn.disabled=false;
      if(!silent){inp.classList.remove('err');void inp.offsetWidth;inp.classList.add('err');msg.textContent='That passphrase did not fit. Check the note and try again.';inp.focus();inp.select();}
