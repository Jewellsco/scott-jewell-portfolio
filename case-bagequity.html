<title>Protected work, Scott Jewell</title>

<style>
 :root{--paper:#FBFAF8;--ink:#0C0C0D;--ink2:#44444A;--muted:#86868B;--accent:#1E66FF;--line:#E7E4DD;--display:"Fraunces",Georgia,serif;--sans:"Inter",-apple-system,BlinkMacSystemFont,sans-serif;}
 *{margin:0;padding:0;box-sizing:border-box;}
 body{background:var(--paper);color:var(--ink);font-family:var(--sans);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
 .gate{width:100%;max-width:430px;text-align:center;}
 .eyebrow{font-size:12px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);}
 h1{font-family:var(--display);font-weight:400;font-size:clamp(30px,6vw,42px);letter-spacing:-.02em;margin-top:14px;line-height:1.05;}
 p{color:var(--ink2);font-size:15px;line-height:1.6;margin-top:14px;}
 form{margin-top:26px;display:flex;flex-direction:column;gap:12px;}
 input{font-family:var(--sans);font-size:16px;padding:15px 18px;border:1px solid var(--line);border-radius:14px;background:#fff;color:var(--ink);outline:none;transition:border-color .2s,box-shadow .2s;}
 input:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(30,102,255,.12);}
 button{font-family:var(--sans);font-size:16px;font-weight:600;padding:15px 18px;border:0;border-radius:14px;background:var(--accent);color:#fff;cursor:pointer;transition:transform .15s,filter .2s;}
 button:hover{filter:brightness(1.05);} button:active{transform:scale(.99);}
 .err{color:#c0362c;font-size:13.5px;min-height:18px;margin-top:2px;opacity:0;transition:opacity .2s;}
 .err.show{opacity:1;}
 .back{display:inline-block;margin-top:24px;font-size:13.5px;color:var(--muted);text-decoration:none;}
 .back:hover{color:var(--ink);}
</style>
</head>
<body>

  <div class="eyebrow">Protected work</div>
  <h1>BagEquity case study</h1>
  <p>This is a private, in-progress fintech project. Enter the password to view it, or reach out if you need access.</p>

   <input id="pw" type="password" placeholder="Password" autocomplete="off" autofocus>
   <button type="submit">View case study</button>
   <div class="err" id="e">That password is not right. Try again.</div>
  </form>

 function b64(s){var bin=atob(s),u=new Uint8Array(bin.length);for(var i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i);return u;}
 async function unlock(pw){
  var enc=new TextEncoder();
  var km=await crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveKey']);
  var key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(DATA.salt),iterations:DATA.iter,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
  var pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(DATA.iv)},key,b64(DATA.ct));
  return new TextDecoder().decode(pt);
 }
 document.getElementById('f').addEventListener('submit',async function(ev){
  ev.preventDefault();
  var e=document.getElementById('e'); e.classList.remove('show');
  try{
   var html=await unlock(document.getElementById('pw').value);
   document.open(); document.write(html); document.close();
  }catch(err){ e.classList.add('show'); document.getElementById('pw').value=''; document.getElementById('pw').focus(); }
 });
