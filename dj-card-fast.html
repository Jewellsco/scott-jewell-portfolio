<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fast delivery card</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{ --canvas:#ECE9E6; --ink:#0C0C0D; --muted:#7d7a75; --grotesk:"Inter",-apple-system,sans-serif; }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:var(--grotesk);background:var(--canvas);color:var(--ink);min-height:100vh;
    display:flex;align-items:center;justify-content:center;padding:60px 24px;-webkit-font-smoothing:antialiased;}

  .card{width:300px;}
  .tile{position:relative;aspect-ratio:1;border-radius:24px;overflow:hidden;
    box-shadow:0 30px 60px rgba(20,18,30,.22);}
  .tile .bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;}
  .tile .vig{position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(120% 120% at 50% 30%,rgba(0,0,0,0) 55%,rgba(0,0,0,.12));}

  /* frosted glossy icon */
  .icon{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
  .icon svg{width:38%;height:38%;filter:drop-shadow(0 12px 20px rgba(0,0,0,.30));}

  .title{font-weight:800;font-size:26px;letter-spacing:-.02em;margin-top:20px;}
  .desc{font-weight:400;font-size:15px;line-height:1.5;color:var(--muted);margin-top:8px;max-width:26ch;}
</style>
</head>
<body>
  <div class="card">
    <div class="tile">
      <img class="bg" src="dj-grad-fast.png" alt="">
      <div class="vig"></div>
      <div class="icon">
        <svg viewBox="0 0 100 100" fill="none">
          <defs>
            <linearGradient id="glass" x1="0" y1="0" x2="0" y2="100" gradientUnits="userSpaceOnUse">
              <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/>
              <stop offset="1" stop-color="#ffffff" stop-opacity="0.62"/>
            </linearGradient>
          </defs>
          <path d="M56 8 28 54h18l-6 38 32-50H52l4-34Z" fill="url(#glass)"/>
          <path d="M56 8 28 54h18l-6 38 32-50H52l4-34Z" fill="none" stroke="#ffffff" stroke-opacity="0.55" stroke-width="1.4"/>
        </svg>
      </div>
    </div>
    <div class="title">Fast delivery</div>
    <div class="desc">Get your design in a couple of days on average.</div>
  </div>
</body>
</html>
